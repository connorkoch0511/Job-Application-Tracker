name: Daily Scrape & Score

on:
  schedule:
    - cron: "0 9 * * *"  # 9am UTC = 5am ET daily
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  scrape-and-score:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          JOB_KEYWORDS: ${{ secrets.JOB_KEYWORDS }}
          JOB_LOCATION: ${{ secrets.JOB_LOCATION }}
        run: python scraper/main.py

      - name: Install scorer dependencies
        run: pip install -r scorer/requirements.txt

      - name: Run scorer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scorer/main.py

      - name: Run cleanup (delete jobs older than 30 days)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python cleanup/main.py

      - name: Trigger email digest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -n "$CRON_SECRET" ] && [ -n "$APP_URL" ]; then
            curl -sf -X GET "$APP_URL/api/digest" \
              -H "Authorization: Bearer $CRON_SECRET" \
              && echo "Digest sent." || echo "Digest request failed (non-fatal)."
          else
            echo "CRON_SECRET or APP_URL not set — skipping digest."
          fi
